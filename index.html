<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMI Orange County - IT Helpdesk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: rgba(0,0,0,0.1); color: white; padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-size: 28px; opacity: 0.9; }
        .header p { font-size: 14px; opacity: 0.7; margin-top: 5px; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; flex: 1; display: flex; flex-direction: column; }
        .chat-container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; min-height: 500px; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 8px; max-width: 80%; }
        .message.user { background: #667eea; color: white; margin-left: auto; text-align: right; }
        .message.bot { background: #f0f0f0; color: #333; }
        .input-area { padding: 20px; border-top: 1px solid #eee; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 14px; }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .submit-ticket-btn { background: #764ba2; }
        .submit-ticket-btn:hover { background: #63408a; }
        .ticket-form { display: none; margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .ticket-form.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 5px; }
        .form-group textarea { min-height: 100px; font-family: inherit; }
        .loading { text-align: center; color: #999; padding: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛟 NAMI Orange County - IT Helpdesk</h1>
        <p>Get instant tech support when I'm not around</p>
    </div>
    <div class="container">
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot">Hi! I'm the NAMI IT Assistant. How can I help you today? For example, you can ask about camera issues, printer problems, email access, or any other tech questions.</div>
            </div>
            <div class="input-area">
                <div class="input-group">
                    <input type="text" id="userInput" placeholder="Describe your tech issue..." />
                    <button onclick="sendMessage()">Send</button>
                    <button class="submit-ticket-btn" onclick="toggleTicketForm()">Submit Ticket</button>
                </div>
                <div class="ticket-form" id="ticketForm">
                    <h3 style="margin-bottom: 10px;">Submit a Support Ticket</h3>
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="ticketName" placeholder="Enter your name" />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="ticketEmail" placeholder="your.email@namioc.org" />
                    </div>
                    <div class="form-group">
                        <label>What's wrong and what do you need help with?</label>
                        <textarea id="ticketDescription" placeholder="Describe your issue in detail..."></textarea>
                    </div>
                    <button onclick="submitTicket()">Send Ticket to Enrique</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const FUNCTION_URL = 'https://aihelpdeskfuncapp.azurewebsites.net/api/chat';
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            userInput.value = '';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = 'Thinking...';
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                const response = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                loadingDiv.remove();
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.response || 'I received your question. Let me help you with that.', 'bot');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again or submit a ticket.', 'bot');
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('Connection error. Please check your internet or submit a ticket for urgent issues.', 'bot');
            }
        }
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function toggleTicketForm() {
            document.getElementById('ticketForm').classList.toggle('active');
        }
        
        async function submitTicket() {
            const name = document.getElementById('ticketName').value.trim();
            const email = document.getElementById('ticketEmail').value.trim();
            const description = document.getElementById('ticketDescription').value.trim();
            
            if (!name || !email || !description) {
                alert('Please fill in all fields');
                return;
            }
            
            const ticketMessage = `NEW SUPPORT TICKET\n\nFrom: ${name}\nEmail: ${email}\n\nIssue Description:\n${description}`;
            
            try {
                const response = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: ticketMessage, isTicket: true })
                });
                
                if (response.ok) {
                    alert('Ticket submitted successfully! Enrique will get back to you soon.');
                    document.getElementById('ticketName').value = '';
                    document.getElementById('ticketEmail').value = '';
                    document.getElementById('ticketDescription').value = '';
                    toggleTicketForm();
                } else {
                    alert('Failed to submit ticket. Please try again.');
                }
            } catch (error) {
                alert('Error submitting ticket. Please email Enrique directly.');
            }
        }
    </script>
</body>
</html>
